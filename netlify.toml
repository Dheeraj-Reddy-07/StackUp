# Netlify config for the StackUp frontend (client/ is a Vite + React SPA)
[build]
  base = "client"            # run the build inside the client/ folder
  command = "npm run build"  # produces client/dist
  publish = "dist"           # publish client/dist (relative to base)

# SPA fallback: send all routes to index.html so react-router works on refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
