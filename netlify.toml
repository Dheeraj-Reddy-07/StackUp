# Netlify config for the StackUp frontend (client/ is a Vite + React SPA).
# Self-contained and run from the repo ROOT (no base directory) so it does
# not conflict with any build settings configured in the Netlify dashboard.
[build]
  command = "npm --prefix client ci && npm --prefix client run build"
  publish = "client/dist"

# SPA fallback: send all routes to index.html so react-router works on refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
