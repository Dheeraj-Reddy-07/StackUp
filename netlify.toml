# Netlify config for the StackUp frontend (client/ is a Vite + React SPA).
# base = "client" makes the build run inside client/, where Netlify also
# auto-installs dependencies. command and publish are relative to that base.
[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

# SPA fallback: send all routes to index.html so react-router works on refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
